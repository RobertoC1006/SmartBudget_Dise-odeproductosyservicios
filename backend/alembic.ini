# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use for "slug" in revision filenames
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported from the current directory
prepend_sys_path = true

# version location specification; this defaults
# to alembic/versions.  when using multiple version
# directories, paths must be separated by spaces
# version_locations = %(here)s/bar %(here)s/bat alembic/versions

# version path separator; defaults to os.pathsep.
# Use a space to span multiple lines in version_locations
# version_path_separator = :

# the database url is configured dynamically in env.py
sqlalchemy.url = mysql+pymysql://sb_user:sb_pass@mysql:3306/smartbudget_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
