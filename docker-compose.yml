name: smartbudget_backend_dise

services:
  # ─── MySQL 8.0 ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartbudget_dise_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - smartbudget_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend FastAPI ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartbudget_dise_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartbudget_net
    volumes:
      - ./backend:/app
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app

  # ─── Adminer (Gestor BD) ──────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: smartbudget_dise_adminer
    restart: always
    ports:
      - "8082:8080"
    networks:
      - smartbudget_net
    depends_on:
      - mysql

volumes:
  mysql_data:

networks:
  smartbudget_net:
    driver: bridge
